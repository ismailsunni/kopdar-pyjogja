<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Peta Kopdar PyJogja</title>
</head>
<body>
  <div id="map"></div>

  <!-- Floating panel -->
  <div id="panel">
    <div id="panel-header">
      <div class="panel-header-left">
        <a href="../index.html" class="back-link">←</a>
        <div class="panel-titles">
          <div class="panel-title">Kopdar PyJogja 🐍</div>
          <div class="panel-subtitle">Python Yogyakarta</div>
        </div>
      </div>
      <button id="minimize-btn" title="Minimize">–</button>
    </div>
    <div id="panel-body">
      <div id="stats-bar">— kopdar ditampilkan</div>

      <div class="filter-section">
        <div class="filter-label">Rentang Waktu</div>
        <div id="time-slider"></div>
        <div class="time-range-row">
          <span id="time-range-label">Mar 2022 — Des 2025</span>
          <button id="reset-filter">Reset</button>
        </div>
      </div>

      <div class="filter-section">
        <div class="filter-label">Tipe Event</div>
        <div id="type-pills">
          <button class="type-pill active" data-type="normal_talk" style="--pill-color:#3b82f6">● Talks</button>
          <button class="type-pill active" data-type="lightning_talk" style="--pill-color:#f59e0b">● Lightning</button>
          <button class="type-pill active" data-type="conference" style="--pill-color:#8b5cf6">● Konferensi</button>
          <button class="type-pill active" data-type="workshop" style="--pill-color:#10b981">● Workshop</button>
          <button class="type-pill active" data-type="hackathon" style="--pill-color:#ef4444">● Hackathon</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Popup overlay (OL will manage positioning) -->
  <div id="popup" class="ol-popup">
    <button id="popup-closer" class="ol-popup-closer">×</button>
    <div id="popup-content"></div>
  </div>

  <!-- Hover tooltip -->
  <div id="tooltip" class="map-tooltip"></div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
